# Rotate AO registry WAL and queue safely while processes keep running.
/var/lib/ao/registry-wal.ndjson /var/lib/ao/outbox-queue.ndjson /var/lib/ao/queue.ndjson {
    daily
    rotate 7
    copytruncate
    compress
    notifempty
    missingok
    dateext
    create 640 ao ao
}

# Audit logs emitted by AO (if enabled).
/var/log/ao/audit/*.log {
    weekly
    rotate 12
    copytruncate
    compress
    notifempty
    missingok
    dateext
    create 640 ao ao
}
