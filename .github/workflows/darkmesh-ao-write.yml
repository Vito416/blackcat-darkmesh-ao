name: darkmesh-ao-write

on:
  push:
    paths:
      - "blackcat-darkmesh-ao/**"
      - "blackcat-darkmesh-write/**"
      - "Dockerfile.ao-write-test"
      - "docker-compose.test.yml"
  pull_request:
    paths:
      - "blackcat-darkmesh-ao/**"
      - "blackcat-darkmesh-write/**"
      - "Dockerfile.ao-write-test"
      - "docker-compose.test.yml"
  workflow_dispatch:

jobs:
  ao-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build ao-write-test image
        run: docker build -f Dockerfile.ao-write-test -t ao-write-ci .
      - name: Run luacheck + ingest_smoke + bundler
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e LUA_PATH="?.lua;?/init.lua;ao/?.lua;ao/?/init.lua;/workspace/blackcat-darkmesh-ao/?.lua;/workspace/blackcat-darkmesh-ao/?/init.lua;/workspace/blackcat-darkmesh-ao/ao/?.lua;/workspace/blackcat-darkmesh-ao/ao/?/init.lua;/usr/local/share/lua/5.4/?.lua;/usr/local/share/lua/5.4/?/init.lua" \
            -e LUA_CPATH="/usr/local/lib/lua/5.4/?.so" \
            -e AO_WEAVEDB_EXPORT_PATH=/tmp/ao-export.ndjson \
            -e WRITE_OUTBOX_EXPORT_PATH=/tmp/write-export.ndjson \
            ao-write-ci sh -c "
              cd /workspace/blackcat-darkmesh-write &&
              luacheck ao &&
              LUA_PATH=\$LUA_PATH LUA_CPATH=\$LUA_CPATH lua5.4 scripts/verify/ingest_smoke.lua &&
              LUA_PATH=\$LUA_PATH LUA_CPATH=\$LUA_CPATH AO_WEAVEDB_EXPORT_PATH=/tmp/write-export.ndjson lua5.4 /workspace/blackcat-darkmesh-ao/scripts/export/bundle_export.lua | head -n 5
            "
