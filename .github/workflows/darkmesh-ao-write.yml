name: darkmesh-ao-write

on:
  push:
    paths:
      - "blackcat-darkmesh-write/**"
      - "Dockerfile.ao-write-test"
      - ".github/workflows/darkmesh-ao-write.yml"
  pull_request:
    paths:
      - "blackcat-darkmesh-write/**"
      - "Dockerfile.ao-write-test"
      - ".github/workflows/darkmesh-ao-write.yml"
  workflow_dispatch:

permissions: { contents: read }

jobs:
  ao-write:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Detect embedded write workspace
        id: detect
        shell: bash
        run: |
          if [ -f "Dockerfile.ao-write-test" ] && [ -d "blackcat-darkmesh-write/ao" ]; then
            echo "enabled=1" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip (workspace does not contain embedded write test setup)
        if: steps.detect.outputs.enabled != '1'
        run: |
          echo "Skipping darkmesh-ao-write: Dockerfile.ao-write-test or blackcat-darkmesh-write/ao is missing in this repo layout."

      - name: Build ao-write-test image
        if: steps.detect.outputs.enabled == '1'
        run: docker build -f Dockerfile.ao-write-test -t ao-write-ci .

      - name: Run luacheck + ingest_smoke + bundler
        if: steps.detect.outputs.enabled == '1'
        env:
          OUTBOX_HMAC_SECRET: ${{ secrets.OUTBOX_HMAC_SECRET_TEST || secrets.OUTBOX_HMAC_SECRET }}
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -e LUA_PATH="?.lua;?/init.lua;ao/?.lua;ao/?/init.lua;/workspace/blackcat-darkmesh-ao/?.lua;/workspace/blackcat-darkmesh-ao/?/init.lua;/workspace/blackcat-darkmesh-ao/ao/?.lua;/workspace/blackcat-darkmesh-ao/ao/?/init.lua;/usr/local/share/lua/5.4/?.lua;/usr/local/share/lua/5.4/?/init.lua" \
            -e LUA_CPATH="/usr/local/lib/lua/5.4/?.so" \
            -e AO_WEAVEDB_EXPORT_PATH=/tmp/ao-export.ndjson \
            -e WRITE_OUTBOX_EXPORT_PATH=/tmp/write-export.ndjson \
            -e OUTBOX_HMAC_SECRET=${{ env.OUTBOX_HMAC_SECRET }} \
            ao-write-ci sh -c "
              cd /workspace/blackcat-darkmesh-write &&
              luacheck ao &&
              LUA_PATH=\$LUA_PATH LUA_CPATH=\$LUA_CPATH lua5.4 scripts/verify/ingest_smoke.lua &&
              LUA_PATH=\$LUA_PATH LUA_CPATH=\$LUA_CPATH lua5.4 scripts/verify/idempotency_replay.lua &&
              LUA_PATH=\$LUA_PATH LUA_CPATH=\$LUA_CPATH OUTBOX_HMAC_SECRET=\$OUTBOX_HMAC_SECRET lua5.4 scripts/verify/publish_outbox_mock_ao.lua &&
              LUA_PATH=\$LUA_PATH LUA_CPATH=\$LUA_CPATH OUTBOX_HMAC_SECRET=\$OUTBOX_HMAC_SECRET lua5.4 tests/security/hmac_replay.lua &&
              LUA_PATH=\$LUA_PATH LUA_CPATH=\$LUA_CPATH AO_WEAVEDB_EXPORT_PATH=/tmp/write-export.ndjson lua5.4 /workspace/blackcat-darkmesh-ao/scripts/export/bundle_export.lua | head -n 5
            "
