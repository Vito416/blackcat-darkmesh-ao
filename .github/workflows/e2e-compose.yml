name: E2E Compose Smoke

on:
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AO repo
        uses: actions/checkout@v6

      - name: Clone gateway + write repos
        run: |
          git clone https://github.com/Vito416/blackcat-darkmesh-write.git write
          git clone https://github.com/Vito416/blackcat-darkmesh-gateway.git gateway

      - name: Run compose smoke
        env:
          WRITE_KEEP_ALIVE: 0
          OUTBOX_HMAC_SECRET: ${{ secrets.OUTBOX_HMAC_SECRET_TEST }}
          WRITE_WEBHOOK_HMAC_SECRET: ${{ secrets.WRITE_WEBHOOK_HMAC_SECRET_TEST }}
        run: docker compose -f docs/docker-compose-e2e.yml up --build --abort-on-container-exit --exit-code-from worker

      - name: Compose logs
        if: always()
        run: docker compose -f docs/docker-compose-e2e.yml logs
