name: Worker CI

on:
  push:
    paths:
      - "worker/**"
  pull_request:
    paths:
      - "worker/**"
  workflow_dispatch: {}

permissions: { contents: read }

jobs:
  test:
    runs-on: ubuntu-latest
    container: node:20-bullseye
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install (Linux container to avoid platform drift)
        run: npm ci --ignore-scripts
      - name: Test (vitest)
        run: npm test -- --reporter=basic --pool=forks --maxConcurrency=1 --testTimeout=30000
      - name: Janitor TTL (miniflare)
        run: npm test -- --run test/janitor.test.ts --reporter=basic --pool=forks --maxConcurrency=1 --testTimeout=30000
