name: Worker CI

on:
  push:
    paths:
      - "worker/**"
  pull_request:
    paths:
      - "worker/**"
  workflow_dispatch: {}

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: worker/package-lock.json
      - name: Install
        run: npm ci
      - name: Test (vitest)
        run: |
          npm test -- --reporter=basic --pool=forks --maxConcurrency=1 --testTimeout=30000
      - name: Janitor TTL (miniflare)
        run: |
          npm test -- --run tests/janitor.test.ts --reporter=basic --pool=forks --maxConcurrency=1 --testTimeout=30000
