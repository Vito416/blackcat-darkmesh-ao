name: darkmesh-worker-tests

on:
  push:
    paths:
      - "blackcat-darkmesh-ao/worker/**"
      - "docker-compose.test.yml"
  pull_request:
    paths:
      - "blackcat-darkmesh-ao/worker/**"
      - "docker-compose.test.yml"
  workflow_dispatch:

permissions: { contents: read }

jobs:
  worker:
    runs-on: ubuntu-latest
    container: node:20-bullseye
    defaults:
      run:
        working-directory: blackcat-darkmesh-ao/worker
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install deps
        run: |
          npm ci --ignore-scripts
      - name: Run worker tests (in-memory KV)
        run: |
          TEST_IN_MEMORY_KV=1 \
          MINIFLARE_KV_PERSIST=false \
          MINIFLARE_D1_PERSIST=:memory: \
          npm test -- --testTimeout=30000 --reporter=basic --pool=forks --maxConcurrency=1 --run test/metrics-auth.test.ts test/security-pen.test.ts test/notify.test.ts
