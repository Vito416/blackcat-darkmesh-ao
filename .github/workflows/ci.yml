name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch: {}

permissions: { contents: read }

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    name: Static checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Lua 5.4
        run: |
          sudo apt-get update
          sudo apt-get install -y lua5.4 lua5.4-dev luarocks libsodium-dev

      - name: "Install required rocks (Lua 5.4: lua-cjson/luv/lsqlite3/luaossl/luasodium)"
        run: |
          rocks=(lua-cjson luv lsqlite3 luaossl luasodium)
          for rock in "${rocks[@]}"; do
            luarocks --lua-version=5.4 install --local "$rock" || exit 1
          done
          echo "$HOME/.luarocks/bin" >> $GITHUB_PATH

      - name: Export LuaRocks paths (Lua 5.4)
        run: |
          eval "$(luarocks --lua-version=5.4 path)"
          {
            echo "LUA_PATH=$LUA_PATH"
            echo "LUA_CPATH=$LUA_CPATH"
          } >> "$GITHUB_ENV"

      - name: Install luacheck (Lua 5.4)
        run: |
          if command -v luarocks >/dev/null 2>&1; then
            luarocks --lua-version=5.4 install --local luacheck || true
            echo "$HOME/.luarocks/bin" >> $GITHUB_PATH
          else
            echo "luarocks not installed; failing luacheck install" && exit 1
          fi

      - name: Install stylua binary
        run: |
          STYLUA_VERSION=2.4.0
          curl -sSfL https://github.com/JohnnyMorganz/StyLua/releases/download/v${STYLUA_VERSION}/stylua-linux-x86_64.zip -o /tmp/stylua.zip
          unzip -o /tmp/stylua.zip -d /tmp
          sudo mv /tmp/stylua /usr/local/bin/stylua
          stylua --version

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.30.0
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Preflight (schemas + Lua syntax + deps)
        env:
          RUN_DEPS_CHECK: 1
          RUN_INTEGRITY_REGISTRY_SPEC: 1
          AUTH_REQUIRE_SIGNATURE: 1  # fail-closed: require libsodium/openssl present
          AUTH_SIGNATURE_SECRET: test-ci-secret
        run: |
          chmod +x scripts/verify/preflight.sh
          scripts/verify/preflight.sh

      - name: Enforce libsodium/ed25519
        run: scripts/verify/libsodium_strict.sh

      - name: Checksum alert (audit/queue/wal)
        env:
          AUDIT_LOG_DIR: arweave/manifests
        run: |
          chmod +x scripts/verify/checksum_alert.sh
          scripts/verify/checksum_alert.sh

      - name: Secret scan (gitleaks)
        run: gitleaks detect --no-git -v --config .gitleaks.toml

      - name: Arweave hash verify (optional)
        if: env.ARWEAVE_VERIFY_FILE != '' && env.ARWEAVE_VERIFY_TX != ''
        env:
          ARWEAVE_VERIFY_FILE: ${{ env.ARWEAVE_VERIFY_FILE }}
          ARWEAVE_VERIFY_TX: ${{ env.ARWEAVE_VERIFY_TX }}
        run: scripts/verify/verify_arweave_hash.sh "$ARWEAVE_VERIFY_FILE" "$ARWEAVE_VERIFY_TX"

      - name: Luacheck (informational)
        continue-on-error: true
        run: |
          luacheck ao scripts || true

      - name: Stylua
        run: stylua --check ao scripts

      - name: Ingest smoke
        run: lua5.4 scripts/verify/ingest_smoke.lua

      - name: Publish → AO ingest mock
        run: lua5.4 scripts/verify/publish_outbox_ingest.lua

      - name: PII scrub regression
        run: lua5.4 scripts/verify/pii_scrub.lua

      - name: AO integration/security scaffolding
        env:
          LUA_PATH: "?.lua;?/init.lua;ao/?.lua;ao/?/init.lua"
          METRICS_LOG: /tmp/ao-metrics.log
          METRICS_PROM_PATH: /tmp/ao-metrics.prom
          AUTH_RATE_LIMIT_MAX_REQUESTS: 1
          AUTH_RATE_LIMIT_WINDOW_SECONDS: 30
        run: |
          lua5.4 tests/integration/ingest_apply_spec.lua
          lua5.4 tests/integration/schema_validation_spec.lua
          lua5.4 tests/security/rate_limit_replay_spec.lua
          lua5.4 tests/security/pii_regression_spec.lua
          lua5.4 tests/integration/analytics_spec.lua

      - name: Public API contract tests (node:test)
        run: node --test tests/http/public_api_server.contract.test.mjs

      - name: Bundle export (if export file present)
        env:
          AO_WEAVEDB_EXPORT_PATH: ${{ env.AO_WEAVEDB_EXPORT_PATH }}
        run: |
          mkdir -p artifacts
          EXPORT=${AO_WEAVEDB_EXPORT_PATH:-dev/public-export.ndjson}
          if [ -f "${EXPORT}" ]; then
            AO_WEAVEDB_EXPORT_PATH="$EXPORT" lua5.4 scripts/export/bundle_export.lua > artifacts/bundle.json
          else
            echo "AO_WEAVEDB_EXPORT_PATH not found, skipping bundle export"
          fi

      - name: Export audit logs (mock)
        if: always()
        run: |
          chmod +x scripts/export/audit_ci.sh
          scripts/export/audit_ci.sh

      - name: Upload audit logs artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: audit-logs
          path: artifacts/audit.ndjson
          if-no-files-found: ignore

      - name: Upload bundle artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ao-bundle
          path: artifacts/bundle.json
          if-no-files-found: ignore

      - name: Arweave health (optional)
        if: env.ARWEAVE_HTTP_ENDPOINT != ''
        env:
          ARWEAVE_HTTP_ENDPOINT: ${{ env.ARWEAVE_HTTP_ENDPOINT }}
          ARWEAVE_HTTP_TIMEOUT: 5
        run: bash scripts/verify/arweave_health.sh

      - name: Signer check (optional)
        if: env.ARWEAVE_HTTP_REAL == '1'
        env:
          ARWEAVE_HTTP_SIGNER: ${{ env.ARWEAVE_HTTP_SIGNER }}
          ARWEAVE_HTTP_REAL: ${{ env.ARWEAVE_HTTP_REAL }}
        run: bash scripts/verify/signer_check.sh

  worker:
    name: Worker vitest
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: worker/package-lock.json
      - name: Install (skip lifecycle scripts)
        run: npm ci --ignore-scripts
      - name: Run vitest
        env:
          TEST_IN_MEMORY_KV: "1"
        run: npm test -- --run
      - name: Stress smoke
        env:
          TEST_IN_MEMORY_KV: "1"
        run: npm run test:stress
