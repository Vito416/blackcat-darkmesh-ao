version: '3.9'
services:
  write:
    image: alpine:3.19
    working_dir: /app
    volumes:
      - ../blackcat-darkmesh-write:/app:ro
    environment:
      OUTBOX_HMAC_SECRET: 0123456789abcdef0123456789abcdef
      WRITE_REQUIRE_SIGNATURE: '0'
      WRITE_REQUIRE_NONCE: '0'
      METRICS_PROM_PATH: /tmp/metrics.prom
    command: ["/bin/sh", "-c", "apk add --no-cache lua5.4 lua5.4-dev luarocks && lua5.4 scripts/verify/publish_outbox_mock_ao.lua"]

  gateway:
    build: ../blackcat-darkmesh-gateway
    working_dir: /app
    environment:
      METRICS_BASIC_USER: prom
      METRICS_BASIC_PASS: prompass
      PAYPAL_WEBHOOK_SECRET: test
      GW_CERT_PIN_SHA256: ''
    command: ["npm", "test", "--", "--run", "tests/metrics-auth.test.ts"]

  worker:
    build: ./worker
    working_dir: /app
    environment:
      TEST_IN_MEMORY_KV: '1'
      INBOX_HMAC_SECRET: change-me
      NOTIFY_HMAC_SECRET: change-me
      METRICS_BASIC_USER: prom
      METRICS_BASIC_PASS: prompass
    command: ["npm", "test", "--", "--run", "tests/metrics-auth.test.ts"]
