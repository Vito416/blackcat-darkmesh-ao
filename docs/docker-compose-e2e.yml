services:
  write:
    image: alpine:3.19
    working_dir: /app
    volumes:
      # use sibling write repo at workspace root
      - ../../blackcat-darkmesh-write:/app
    environment:
      OUTBOX_HMAC_SECRET: ${OUTBOX_HMAC_SECRET:?set}
      WRITE_REQUIRE_SIGNATURE: '0'
      WRITE_REQUIRE_NONCE: '0'
      WRITE_WEBHOOK_REPLAY_WINDOW: '600'
      METRICS_PROM_PATH: /tmp/metrics.prom
      WRITE_KEEP_ALIVE: ${WRITE_KEEP_ALIVE:-0}
    command:
      - /bin/sh
      - -c
      - >
        apk add --no-cache lua5.4 lua5.4-dev luarocks
        && lua5.4 scripts/verify/publish_outbox_mock_ao.lua
        && if [ "$WRITE_KEEP_ALIVE" = "1" ]; then tail -f /dev/null; fi

  gateway:
    depends_on:
      - write
    image: node:20-alpine
    working_dir: /app
    volumes:
      # use the top-level gateway repo (sibling of -ao), not the empty stub in this repo
      - ../../blackcat-darkmesh-gateway:/app
    environment:
      METRICS_BASIC_USER: prom
      METRICS_BASIC_PASS: prompass
      PAYPAL_WEBHOOK_SECRET: test
      GW_CERT_PIN_SHA256: ''
      WRITE_WEBHOOK_TARGET: http://write:8787/mock-provider
      WRITE_WEBHOOK_HMAC_SECRET: ${WRITE_WEBHOOK_HMAC_SECRET:?set}
      WORKER_NOTIFY_URL: http://worker:8787/notify
      WORKER_NOTIFY_TOKEN: t-notify
      WORKER_NOTIFY_HMAC: secret-hmac
      WORKER_NOTIFY_BREAKER_KEY: gateway
      GATEWAY_NOTIFY_URL: http://gateway:8787/webhook/demo-forward
      GATEWAY_NOTIFY_HMAC: secret-hmac
    command: ["/bin/sh", "-c", "npm ci && npm test -- --run tests/metrics-auth.test.ts tests/webhook-pentest.test.ts"]

  worker:
    depends_on:
      - gateway
    image: node:20-alpine
    working_dir: /app
    volumes:
      # worker sources live one level up from docs/
      - ../worker:/app
    environment:
      TEST_IN_MEMORY_KV: '1'
      INBOX_HMAC_SECRET: change-me
      NOTIFY_HMAC_SECRET: change-me
      NOTIFY_RATE_MAX: '5'
      NOTIFY_RATE_WINDOW: '60'
      METRICS_BASIC_USER: prom
      METRICS_BASIC_PASS: prompass
    command: ["/bin/sh", "-c", "npm ci && npm test -- --run test/metrics-auth.test.ts test/security-pen.test.ts test/notify.test.ts"]
